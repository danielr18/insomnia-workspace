          - name: from_date
            in: query
            type: string
            required: false
          - name: to_date
            in: query
            type: string
            required: false
        get:
          summary: Retrieves Real Asset Days
          produces:
            - application/json
          description: Retrieves real asset days
          responses:
            "200":
              description: filtering by date
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/definitions/real_asset_day"
