spec:
  contents:
    swagger: "2.0"
    info:
      title: API V1
      version: v1
    basePath: /api
    definitions:
      access_token_params:
        type: object
        properties:
          email:
            type: string
          password:
            type: string
      asset_provider:
        type: object
        properties:
          id:
            type: string
            example: "3"
          type:
            type: string
            example: asset_provider
          attributes:
            type: object
            properties:
              name:
                type: string
                example: BANCHILE ADMINISTRADORA GENERAL DE FONDOS S.A.
            required:
              - name
        required:
          - id
          - type
          - attributes
      bank:
        type: object
        properties:
          id:
            type: string
            example: "24"
          type:
            type: string
            example: bank
          attributes:
            type: object
            properties:
              name:
                type: string
                example: Banco Chile
            required:
              - name
        required:
          - id
          - type
          - attributes
      conceptual_asset:
        type: object
        properties:
          id:
            type: string
            example: "530"
          type:
            type: string
            example: conceptual_asset
          attributes:
            type: object
            properties:
              name:
                type: string
                example: FONDO MUTUO ZURICH VALOR
              symbol:
                type: string
                example: FFMM-ZURICH-9426
              category:
                type: string
                example: mutual_fund
              currency:
                type: string
                example: CLP
              max_scale:
                type: integer
                example: 4
              run:
                type: string
                example: 9426-9
              data_source:
                type: string
                example: http://www.cmfchile.cl
                nullable: true
            required:
              - name
              - symbol
              - category
              - currency
              - max_scale
              - run
              - data_source
        required:
          - id
          - type
          - attributes
      goal:
        type: object
        properties:
          id:
            type: string
            example: "24"
          type:
            type: string
            example: goal
          attributes:
            type: object
            properties:
              name:
                type: string
                example: Mi Casita
              nav:
                type: number
                example: 666
            required:
              - name
              - nav
        required:
          - id
          - type
          - attributes
      optimal_portfolio:
        type: object
        properties:
          id:
            type: string
            example: "2885"
          type:
            type: string
            example: portfolio
          attributes:
            risk:
              type: integer
              example: 5
            nominal_return:
              type: float
              example: 0.139404112771225
            curve_params:
              type: object
              properties:
                worst_than_97_point_5:
                  type: object
                  properties:
                    a:
                      type: float
                      example: -0.104879548174728
                    b:
                      type: float
                      example: -0.0828703736516636
                  required:
                    - a
                    - b
                required:
                  - worst_than_97_point_5
            portfolio:
              type: array
              items:
                type: object
                properties:
                  ticker:
                    type: string
                    example: FM-FIN-CGC
                  weight:
                    type: float
                    example: 0.04
                  tag:
                    type: string
                    example: bond
                required:
                  - ticker
                  - weight
                  - tag
          relationships:
            type: object
            properties:
              portfolio:
                type: object
                properties:
                  data:
                    type: array
        required:
          - id
          - type
          - attributes
      optimal_portfolio_asset_params:
        type: object
        properties:
          weight:
            type: integer
          conceptual_asset_id:
            type: integer
      optimal_portfolio_params:
        type: object
        properties:
          timeframe:
            type: integer
          risk:
            type: integer
          nominal_return:
            type: float
          worst_than_97_point_5_curve_a:
            type: float
          worst_than_97_point_5_curve_b:
            type: float
      real_asset:
        type: object
        properties:
          id:
            type: string
            example: "9542"
          type:
            type: string
            example: real_asset
          attributes:
            type: object
            properties:
              name:
                type: string
                example: FONDO MUTUO COMPROMISO BANCOESTADO
              symbol:
                type: string
                example: FFMM-BANCOESTADO-8317-F
              serie:
                type: string
                example: F
              start_date:
                type: string
                nullable: true
                example: 2018-03-02
              end_date:
                type: string
                nullable: true
              previous_asset_id:
                type: string
                nullable: true
              last_day:
                type: object
                properties:
                  fixed_management_fee:
                    type: float
                    example: 208846
                  iva_exclusive_expenses:
                    type: float
                    example: 0
                  iva_inclusive_expenses:
                    type: float
                    example: 0
                  net_asset_value:
                    type: float
                    example: 1190.6437
                  purchase_fee:
                    type: float
                    example: 0
                  redemption_fee:
                    type: float
                    example: 0
                  total_assets:
                    type: float
                    example: 353685643029
                  total_net_assets:
                    type: float
                    example: 63669303947
                  variable_management_fee:
                    type: float
                    example: 0
                  fixed_fee:
                    type: float
                    example: 0.00000328636172276668
                  new_shares:
                    type: float
                    example: 100785.8186
                  outstanding_shares:
                    type: float
                    example: 53474691.5562
                  redeemed_shares:
                    type: float
                    example: 0
                  institutional_investors:
                    type: float
                    example: 0
                  shareholder:
                    type: float
                    example: 4
                  date:
                    type: string
                    example: 2021-01-28
              conceptual_asset_id:
                type: integer
                example: 1755
            required:
              - name
              - symbol
              - last_day
        required:
          - id
          - type
          - attributes
      real_asset_day:
        type: object
        properties:
          id:
            type: string
            example: "24"
          type:
            type: string
            example: real_asset_day
          attributes:
            type: object
            properties:
              date:
                type: string
                example: 1984-06-04
              price:
                type: float
                example: 12949224
              fixed_fee:
                type: float
                example: 0.000054543884947175
              variable_fee:
                type: float
                example: 0.0000326027397260274
              net_asset_value:
                type: float
                example: 1
              net_asset_value_type:
                type: string
                example: clp
            required:
              - date
              - price
        required:
          - id
          - type
          - attributes
      real_asset_expense_ratio:
        type: object
        properties:
          id:
            type: string
            example: "9542"
          type:
            type: string
            example: real_asset_expense_ratio
          attributes:
            type: object
            properties:
              expense_ratio:
                type: float
                example: 0.001205367064356366
            required:
              - expense_ratio
        required:
          - id
          - type
          - attributes
      reference_net_asset_value:
        type: object
        properties:
          id:
            type: string
            example: "24"
          type:
            type: string
            example: reference_net_asset_value
          attributes:
            type: object
            properties:
              date:
                type: string
                example: 1984-06-04
              price:
                type: float
                example: 12949224
              serie:
                type: object
                properties:
                  name:
                    type: string
                    example: SOLVENTE
                  conceptual_asset_id:
                    type: integer
                    example: 1
            required:
              - date
              - price
              - serie
        required:
          - id
          - type
          - attributes
      spread:
        type: object
        properties:
          id:
            type: string
            example: "24"
          type:
            type: string
            example: spread
          attributes:
            type: object
            properties:
              date:
                type: string
                example: 1984-06-04
              value:
                type: float
                example: 0.7
              serie:
                type: object
                properties:
                  name:
                    type: string
                    example: SOLVENTE
                  conceptual_asset_id:
                    type: integer
                    example: 1
            required:
              - date
              - value
              - serie
        required:
          - id
          - type
          - attributes
    paths:
      /access_tokens:
        post:
          summary: Retrieves User Auth Token
          description: Retrieves user auth token
          consumes:
            - application/json
          produces:
            - application/json
          parameters:
            - name: user
              in: body
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/definitions/access_token_params"
                required:
                  - user
          responses:
            "201":
              description: Created
            "400":
              description: Invalid Parameters
            "401":
              description: Not Authorized
            "403":
              description: Forbidden Access
            "422":
              description: Missing Attribute
      /asset_providers:
        get:
          summary: Retrieves Asset Providers
          produces:
            - application/json
          description: Retrieves all the asset providers
          responses:
            "200":
              description: with valid params
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/definitions/asset_provider"
                required:
                  - data
      /asset_providers/{id}:
        parameters:
          - name: id
            in: path
            type: integer
            required: true
          - name: name
            in: query
            type: string
            required: false
        get:
          summary: Retrieves Real Asset
          produces:
            - application/json
          description: Retrieves specific asset provider data
          responses:
            "200":
              description: with valid params
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/definitions/asset_provider"
            "404":
              description: with invalid asset provider id
      /banks:
        parameters:
          - name: q
            in: query
            type: string
        get:
          summary: Retrieves Banks
          produces:
            - application/json
          description: Retrieves filtered banks
          responses:
            "200":
              description: with valid params
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/definitions/bank"
                required:
                  - data
      /asset_providers/{asset_provider_id}/conceptual_assets:
        parameters:
          - name: asset_provider_id
            in: path
            type: integer
            required: true
          - name: name
            in: query
            type: string
            required: false
          - name: run
            in: query
            type: integer
            required: false
        get:
          summary: Retrieves Provider's Conceptual Assets
          produces:
            - application/json
          description: Retrieves conceptual assets for the given provider
          responses:
            "200":
              description: filtering by run
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/definitions/conceptual_asset"
                required:
                  - data
            "404":
              description: with invalid real asset id
      /conceptual_assets:
        parameters:
          - name: name
            in: query
            type: string
            required: false
          - name: run
            in: query
            type: integer
            required: false
        get:
          summary: Retrieves Conceptual Assets
          produces:
            - application/json
          description: Retrieves conceptual assets
          responses:
            "200":
              description: filtering by run
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/definitions/conceptual_asset"
                required:
                  - data
      /conceptual_assets/{id}:
        parameters:
          - name: id
            in: path
            type: integer
            required: true
        get:
          summary: Retrieves Conceptual Asset
          produces:
            - application/json
          description: Retrieves specific conceptual asset data
          responses:
            "200":
              description: with valid params
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/definitions/conceptual_asset"
            "404":
              description: with invalid real asset id
      /goals:
        parameters:
          - name: X-User-Email
            in: header
            type: string
            required: true
          - name: X-User-Token
            in: header
            type: string
            required: true
        get:
          summary: Retrieves User Goals
          produces:
            - application/json
          description: Retrieves all the user goals
          responses:
            "200":
              description: with valid params
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/definitions/goal"
                required:
                  - data
            "401":
              description: with invalid user token
      /goals/{id}:
        parameters:
          - name: id
            in: path
            type: integer
            required: true
          - name: X-User-Email
            in: header
            type: string
            required: true
          - name: X-User-Token
            in: header
            type: string
            required: true
        get:
          summary: Retrieves Goal
          produces:
            - application/json
          description: Retrieves specific goal data
          responses:
            "200":
              description: with valid params
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/definitions/goal"
                required:
                  - data
            "401":
              description: with invalid user token
            "404":
              description: with invalid goal id
      /real_assets/{real_asset_id}/days:
        parameters:
          - name: real_asset_id
            in: path
            type: integer
            required: true
          - name: date
            in: query
            type: string
